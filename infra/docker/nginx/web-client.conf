# Site résidents : fichiers statiques Vite + proxy vers le backend.
# Reproduit le proxy de dev (vite.config.ts) : /api/* → backend sans le préfixe,
# /socket.io → backend en WebSocket.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 25m;
    }

    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    # SPA : toute route inconnue renvoie index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
